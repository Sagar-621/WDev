<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Refund & Replacement Policy - DEVASTHRA</title>
    <meta name="description" content="Refund and Replacement Policy for DEVASTHRA">
    <script src="runtime-env.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="backend/images/Fashion logo.jfif">
</head>

<body>
    <div id="site-header"></div>

    <main class="container legal-page">
        <h1 id="refundReplacementPolicyHeading">Refund & Replacement Policy</h1>
        <p id="refundReplacementPolicyUpdated">Last updated: May 14, 2026</p>
        <div id="refundReplacementPolicyDocumentLink" hidden></div>
        <div id="refundReplacementPolicyContent">
            <section>
                <h2>Refund and Replacement</h2>
                <p>You can request a replacement within 24 hours of product delivery. Returns will be processed within 2-4 days.</p>
                <p>Refunds will be processed and credited within 7-10 working days.</p>
            </section>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="site-header.js"></script>
    <script src="site-footer.js"></script>
    <script src="header-category-drawer.js"></script>
    <script src="chat-widget.js"></script>
    <script>
        (async function loadRefundReplacementPolicy() {
            try {
                const res = await fetch(`${window.__API_BASE || window.location.origin}/api/policies/refund-replacement`);
                const data = await res.json();
                if (!data.success || !data.policy) return;

                const heading = document.getElementById('refundReplacementPolicyHeading');
                const updated = document.getElementById('refundReplacementPolicyUpdated');
                const content = document.getElementById('refundReplacementPolicyContent');
                const docLink = document.getElementById('refundReplacementPolicyDocumentLink');

                if (heading) heading.textContent = data.policy.title || 'Refund & Replacement Policy';
                if (updated) updated.textContent = data.policy.last_updated
                    ? `Last updated: ${data.policy.last_updated}`
                    : '';
                if (content && data.policy.content) {
                    content.textContent = data.policy.content;
                    content.style.whiteSpace = 'pre-wrap';
                }
                if (docLink && data.policy.document_url) {
                    docLink.hidden = false;
                    docLink.innerHTML = `<p><a href="${data.policy.document_url}" target="_blank" rel="noopener">View source document</a></p>`;
                }
            } catch (error) {
                console.warn('Unable to load admin-managed refund and replacement policy:', error.message);
            }
        })();
    </script>
</body>

</html>
