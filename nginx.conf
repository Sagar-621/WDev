events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        server_name devasthra.com www.devasthra.com;

        location /.well-known/acme-challenge/ {
            root /home/ec2-user/WDev;
        }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name devasthra.com www.devasthra.com;

        root /home/ec2-user/WDev;
        index index.html;
        client_max_body_size 50M;

        ssl_certificate /etc/letsencrypt/live/devasthra.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devasthra.com/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location ^~ /backend/images/ {
            alias /home/ec2-user/WDev/backend/images/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ^~ /images/Btshirt-catalog/ {
            alias /home/ec2-user/WDev/Btshirt-catalog/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ^~ /images/PLBTshirt-catalog/ {
            alias /home/ec2-user/WDev/PLBTshirt-catalog/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location = /runtime-env.js {
            try_files /runtime-env.js =404;
        }

        location = /send-otp {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /verify-otp {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /send-login-code {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /verify-login-code {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /newsletter-signups {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(products|add-to-cart|cart|save-address|addresses|pincode|create-order|verify-payment|orders|cancel|returns|admin|user|support|health|upload|uploads)(/|$) {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* \.(css|js|jpg|jpeg|jfif|png|gif|ico|svg|webp)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

